syntax = "proto3";

package message.input;

import "google/protobuf/timestamp.proto";

/// Emitted when a referee whistle is detected by the WhistleDetection module.
message Whistle {
    /// Time at which the whistle was detected
    google.protobuf.Timestamp time = 1;

    /// Detection confidence in [0, 1] — ratio of in-band power to the detection threshold
    float confidence = 2;
}
