syntax = "proto3";

package message.input;

import "google/protobuf/timestamp.proto";

message GameState {

    enum TeamColour {
        UNKNOWN = 0;
        BLUE    = 1;
        RED     = 2;
        YELLOW  = 3;
        BLACK   = 4;
        WHITE   = 5;
        GREEN   = 6;
        ORANGE  = 7;
        PURPLE  = 8;
        BROWN   = 9;
        GRAY    = 10;
    };

    enum Mode {
        UNKNOWN_MODE      = 0;
        NORMAL            = 1;
        PENALTY_SHOOTOUT  = 2;
        OVERTIME          = 3;
        TIMEOUT_MODE      = 4;
        DIRECT_FREEKICK   = 5;
        INDIRECT_FREEKICK = 6;
        PENALTYKICK       = 7;
        CORNER_KICK       = 8;
        GOAL_KICK         = 9;
        THROW_IN          = 10;
    }

    enum Phase {
        UNKNOWN_PHASE = 0;
        INITIAL       = 1;
        READY         = 2;
        SET           = 3;
        PLAYING       = 4;
        TIMEOUT       = 5;
        FINISHED      = 6;
    }

    enum PenaltyReason {
        UNPENALISED             = 0;
        ILLEGAL_POSITIONING     = 1;
        MOTION_IN_SET           = 2;
        MOTION_IN_STOP          = 3;
        LOCAL_GAME_STUCK        = 4;
        INCAPABLE_ROBOT         = 5;
        PICK_UP                 = 6;
        BALL_HOLDING            = 7;
        LEAVING_THE_FIELD       = 8;
        PLAYING_WITH_ARMS_HANDS = 9;
        PLAYER_PUSHING          = 10;
        CAUTIONED               = 11;
        SENT_OFF                = 12;
        SUBSTITUTE              = 13;
    }

    /// Used to keep track of penalised robots
    message Robot {
        uint32        id             = 1;
        PenaltyReason penalty_reason = 2;
        /// The timestamp when the robot will be playing again
        google.protobuf.Timestamp unpenalised = 3;
        /// Whether this robot is a goalie
        bool goalie = 4;
    }

    message Team {
        uint32         team_id     = 1;
        TeamColour     team_colour = 2;
        uint32         score       = 3;
        repeated Robot players     = 4;
    }

    Phase                     phase            = 1;
    Mode                      mode             = 2;
    bool                      first_half       = 3;
    bool                      kicked_out_by_us = 4;
    google.protobuf.Timestamp kicked_out_time  = 5;
    bool                      our_kick_off     = 6;
    /// Timestamp when the robot thinks the half is due to end
    google.protobuf.Timestamp primary_time = 7;
    /// A timestamp used for other times. E.g. how long in ready, or how long until penalty ends
    google.protobuf.Timestamp secondary_time = 8;
    Team                      team           = 9;
    Team                      opponent       = 10;
    Robot                     self           = 11;
    bool                      stopped        = 12;
}
