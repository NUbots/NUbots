syntax = "proto3";

package message.localisation;

import "Matrix.proto";
import "Vector.proto";

/// A single confirmed opponent track maintained by the swarm KF.
/// Emitted by SwarmLocalisation for debug visualisation in NUsight.
message SwarmTrackedOpponent {
    /// Position in field frame [m] (x, y; z unused)
    fvec3 position_Ff = 1;
    /// 2x2 position covariance from the KF [m²]
    fmat2 covariance  = 2;
}

/// Swarm-level debug visualisation data emitted by SwarmLocalisation.
///
/// Intended for NUsight only — not for robot logic.
/// Separates visualisation concerns from SwarmState (which drives logic).
///
/// Each robot emits its own SwarmDebug showing its local view of the shared
/// swarm state: what opponents it has confirmed, where the ball is, and
/// what positions its teammates have self-reported.
message SwarmDebug {
    /// Confirmed opponent tracks — passed min_observations and min_sources gates.
    /// Each entry has a KF-fused position and its uncertainty covariance.
    repeated SwarmTrackedOpponent opponents = 1;

    /// Raw self-reported field positions of teammates (from RoboCup broadcasts).
    /// Rendered as diamond markers in NUsight. Not KF-filtered — compare to
    /// UKF-tracked robot cylinders to spot disagreements.
    repeated fvec3 teammate_positions_Ff = 2;

    /// Localisation cost of each teammate (parallel to teammate_positions_Ff).
    /// Used to size the uncertainty ring around each teammate diamond.
    repeated float teammate_costs = 3;

    /// Ball position from the KF fused over all confident teammates' ball reports.
    /// Only valid when ball_seen = true.
    fvec3 ball_position_Ff = 4;

    /// 2x2 ball position covariance [m²]
    fmat2 ball_covariance = 5;

    /// True when at least one confident teammate has recently reported a ball.
    bool ball_seen = 6;
}
