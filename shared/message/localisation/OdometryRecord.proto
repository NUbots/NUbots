syntax = "proto3";

package message.localisation;

import "google/protobuf/timestamp.proto";
import "Matrix.proto";
import "Vector.proto";
import "Transform.proto";

message OdometryRecord {
    /// Timestamp of the observation
    google.protobuf.Timestamp timestamp = 1;

    /// Current velocity target from walk command (vx, vy, vtheta)
    vec3 velocity_target = 2;

    /// Sensor data
    vec3 accelerometer = 3;
    vec3 gyroscope = 4;

    /// Actuated joints info (for NUbots, 20 joints are captured)
    repeated double present_position = 5;
    repeated double present_velocity = 6;
    repeated double goal_position = 7;

    /// Kinematic transform from torso to world
    iso3 Htw = 8;
    
    /// Ground truth displacement torso-to-world (computed from Hft relative to start)
    iso3 Htw_ground_truth = 9;

    /// Ground truth Torso-to-field
    iso3 Hft = 10;

    /// Dead-reckoning (kinematic anchor) homogeneous transform: world {w} to torso {t}, without neural correction
    iso3 Htw_kinematic = 11;
}
