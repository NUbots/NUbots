syntax = "proto3";

package message.localisation;

import "Vector.proto";
import "google/protobuf/timestamp.proto";

/// A single teammate's most recent self-reported localisation state,
/// as received via a RoboCup UDP broadcast.
message TeammateState {
    /// RoboCup player ID of this teammate
    uint32 player_id = 1;

    /// Teammate's self-reported position in field frame (x, y, θ)
    /// x/y in metres from field centre; θ = yaw in radians (z component)
    fvec3 position_Ff = 2;

    /// Localisation cost reported by the teammate (lower = more confident)
    float cost = 3;

    /// Timestamp when we last heard from this teammate
    google.protobuf.Timestamp timestamp = 4;

    /// True if cost < configured threshold AND the entry is not stale
    bool confident = 5;
}

/// Aggregated swarm intelligence compiled from all recent RoboCup broadcasts.
/// Emitted by SwarmLocalisation every time a new RoboCup message arrives.
///
/// Consumers:
///   FieldLocalisationNLopt — teammate positions as self-localisation landmarks;
///                            flip detection via antipodal consensus
///   RobotLocalisation      — opponent positions from teammates' reports
message SwarmState {
    /// All known teammate states (may include recent-but-not-confident entries)
    repeated TeammateState teammates = 1;

    /// Opponent positions in field frame (x, y, 0) compiled from all teammates'
    /// robocup.others reports. Used by RobotLocalisation for shared tracking.
    repeated fvec3 opponent_positions_Ff = 2;

    /// Ball position in field frame from the most confident teammate observer
    fvec3 ball_position_Ff = 3;

    /// True if any teammate reported a ball with confidence above threshold
    bool ball_seen = 4;

    /// Confidence of the best ball observation (0.0–1.0)
    float ball_confidence = 5;

    /// Player ID of the teammate who reported the best ball position
    uint32 ball_reporter_id = 6;
}
