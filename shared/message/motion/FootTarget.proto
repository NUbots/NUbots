syntax = "proto3";

package message.motion;

import "Matrix.proto";
import "google/protobuf/timestamp.proto";

message FootTarget {

    google.protobuf.Timestamp timestamp = 1;
    // identifies which foot is the swing foot
    bool is_right_foot_swing = 2;
    // Transform from world oriented support foot space (g) to target (a)
    mat4  Hw_tg          = 3;
    bool  lift           = 4;
    int64 subsumption_id = 5;
}
