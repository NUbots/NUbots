# serial_number: 0

lens:
  # Lens: Webots based on Lensagon BF10M19828S118C
  # Camera: Webots based on FLIR BFS-U3-13Y3C-C

  # Theoretical normalised focal length
  # Lens Focal Length = 1.98mm
  # Focal length in pixels = 320
  # focal length / image width = 320 / 640 = 0.5

  # NOTE: all lens parameters are based on a full size image (without width/height/offset values)

  # Lens projection type
  projection: RECTILINEAR
  # Normalised focal length: focal length in pixels / image width
  focal_length: 0.5
  # Normalised image centre offset: pixels from centre to optical axis / image width
  centre: [0, 0]
  # The polynomial distortion coefficients for the lens
  k: [0, 0]
  # The angular diameter that the lens covers (the area that light hits on the sensor) or auto for the entire sensor
  fov: 2.0944

settings:
  # PixelFormat: BayerRG8
  Width: 640
  Height: 480
  OffsetX: 0
  OffsetY: 0
  # ExposureAuto: Continuous
  # GainAuto: Continuous
  # BalanceWhiteAuto: Contsinuous

# The calibrated camera {c} to head-pitch {p} transform Hpc, stored as
# translation [m] + ZYX-intrinsic rpy [rad]. Seeded from the nominal URDF FK and tuned by the
# ExtrinsicsCalibration tool to replace the old roll/pitch/yaw_offset scheme
translation: [-0.0648803, -0.0699522, 0.033795]
rpy: [1.5708, 0.0, -1.53589]
