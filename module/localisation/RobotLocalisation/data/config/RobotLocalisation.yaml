# Controls the minimum log level that NUClear log will display
log_level: INFO

# UKF config
ukf:
  noise:
    measurement:
      # Vision-based position measurement noise — camera detection + our own localisation error compounded
      robot_position: [0.5, 0.5]
      # RoboCup broadcast position measurement noise — robot's own self-report, most trusted external source
      robot_position_robocup: [0.1, 0.1]
      # Indirect sighting noise — teammate reports another robot (two localisation errors compounded)
      robot_position_indirect: [5.0, 5.0]
    process:
      position: [1e-1, 1e-1]
      velocity: [1e-2, 1e-2]

  initial_covariance:
    position: [1e-3, 1e-3]
    velocity: [1e-3, 1e-3]

association_distance: 0.5

# Looser distance for teammate landmark emission — tolerates our own localisation being off by meters
landmark_association_distance: 1.0

max_missed_count: 25

max_distance_from_field: 1.0

max_localisation_cost: 2.0

# Maximum number of opponent tracks to maintain (weakest/most-missed removed first)
max_opponent_count: 5
