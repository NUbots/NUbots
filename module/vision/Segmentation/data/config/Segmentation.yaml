# Controls the minimum log level that NUClear log will display
log_level: DEBUG

# Number of segmentation classes
num_classes: 3

# Path to the model weights
model_path: "segmentation_model.onnx"

# OpenVino device.
device: GPU

# Directory where OpenVINO caches compiled model kernels. On the first run the device-specific
# kernels are compiled and stored here; subsequent runs load them from the cache, avoiding the
# multi-second GPU compilation cost at startup. Leave empty to disable caching.
cache_dir: "recordings/openvino_cache"

# Run inference in FP16 instead of FP32. Halves activation memory traffic, which speeds up
# this bandwidth-bound model on the integrated GPU with negligible accuracy impact.
inference_precision_fp16: true

# Field line distance filtering
filter_by_distance: true
max_field_line_distance: 15.0 # Maximum distance in meters to consider field line points valid

# Field point clustering parameters
min_cluster_size: 50 # Minimum number of pixels in a field cluster to be considered valid (measured at the 512x512 segmentation resolution)

# Field line point downsampling
field_line_grid_size: 2 # Keep at most one field line point per NxN pixel cell (<=1 disables downsampling)

# Green horizon
max_horizon_distance: 15.0 # Maximum distance in meters for a green horizon convex hull point
