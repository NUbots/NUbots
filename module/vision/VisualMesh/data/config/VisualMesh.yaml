log_level: DEBUG

# The settings for each camera. Keys must match Image.name as published by the camera
# module (K1Camera.yaml `name:` — "Left Camera" / "Right Camera").
cameras:
  Left Camera:
    concurrent: 2
    # Synthetic-render network: closest match for the NUSim/MuJoCo camera. Swap to
    # RobocupNetwork.yaml for real-robot imagery.
    network: config/networks/WebotsNetwork.yaml
    engine: cpu
    cache_directory: "./vision_cache/"
    classifier:
      height: [0.5, 1.0]
      max_distance: 11
      intersection_tolerance: 0.05
