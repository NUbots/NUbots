# Controls the minimum log level that NUClear log will display
log_level: DEBUG

confidence_threshold: 0.2 # Minimum confidence required for a ball point to be a ball point
cluster_points: 1 # Minimum number of points for a cluster to be a viable ball
merge_buffer_scalar:
  1.4 # When considered if overlapping for merging, its buffer is used which has a radius of
  # the cluster's radius * merge_buffer_scalar
fill_requirement:
  0.7 # Percentage threshold of n. observed point detections divided by
  # n. of expected detections the ball would have
minimum_ball_distance: 0.4 # Minimum distance for a cluster to be a viable ball
distance_disagreement:
  1.0 # Percentage difference between width and projection based distances. 0.0 means
  # the distance measurements must match perfectly
maximum_deviation:
  0.3 # A threshold on how large the standard deviation of the angle between ray and
  # cone axis can be
ball_angular_cov: [0.01, 0.01, 0.01] # Measurement certainties for ball localisation
