# Controls the minimum log level that NUClear log will display
log_level: INFO

# Time lingering at each position in search (seconds)
search_fixation_time: 0.5

# List of positions for search
min_yaw: &min_yaw -0.9
max_yaw: &max_yaw 0.9
center_yaw: &center_yaw 0.0
high_pitch: &high_pitch 0.1 # note that the pitch servo rotates down for positive
mid_pitch: &mid_pitch 0.35
low_pitch: &low_pitch 0.63
level_pitch: &level_pitch 0.0
search_positions:
  [
    [*min_yaw, *mid_pitch],
    [-0.5, *high_pitch],
    [*center_yaw, *high_pitch],
    [0.5, *high_pitch],
    [*max_yaw, *mid_pitch],
    [*center_yaw, *level_pitch],
    [*center_yaw, *low_pitch],
  ]
