# Per-binary PlanLook override for the extrinsicscalibration role. The Configuration system merges this over the
# default PlanLook.yaml when the binary is launched as "bin/extrinsicscalibration" (e.g. via `./b run
# extrinsicscalibration`), so the calibration head sweep uses a dedicated (yaw, pitch) grid without changing the
# soccer ball-search sweep. See module/tools/ExtrinsicsCalibration.

# Controls the minimum log level that NUClear log will display
log_level: INFO

# Time lingering at each position in the sweep (seconds)
search_fixation_time: 1.0

# Head-scan grid: (yaw, pitch) [rad] positions the head sweeps through so the field landmarks are seen across the
# whole image. Positive pitch looks down (matches the head-pitch servo convention).
search_positions:
  [
    [-0.7, 0.0], # yaw left,   level-ish
    [0.0, 0.0], # centre,      level-ish
    [0.7, 0.0], # yaw right,   level-ish
    [0.7, 0.35], # yaw right,  look down
    [0.0, 0.35], # centre,     look down
    [-0.7, 0.35], # yaw left,  look down
    [-0.7, 0.6], # yaw left,   look further down
    [0.0, 0.6], # centre,      look further down
    [0.7, 0.6], # yaw right,   look further down
  ]
