# Controls the minimum log level that NUClear log will display
log_level: INFO

# Map of possible ssid and passwords
wifi_networks:
  Humanoid_A: "rc2024humanoid"
  Humanoid_B: "rc2024humanoid"
  Humanoid_C: "rc2024humanoid"
  Humanoid_D: "rc2024humanoid"

common_ips: [
    "10.1.2.X", # Typical ethernet/lab IP
    "192.168.1.X", # RoboCup NUbots IP
    "192.168.98.X", # RoboCup Drop-In Team A IP
    "192.168.99.X", # RoboCup Drop-In Team B IP
  ]

# Names of field presets defined in FieldDescription.yaml
field_presets: [
    "small", # Small field 9x6m
    "l1",    # L1 field 12x9m
    "l3",    # L3 field 14x9m
  ]
