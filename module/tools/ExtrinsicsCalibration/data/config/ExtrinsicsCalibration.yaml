# Controls the minimum log level that NUClear log will display
log_level: INFO

# Path to the URDF model used for camera forward kinematics (matches the Camera module)
urdf_path: "models/robot.urdf"

# Which camera to calibrate. Either "Left" or "Right". Only one camera is calibrated per run; run again with the
# other camera selected to calibrate both.
camera: "Left"

# Minimum number of associated detection<->landmark samples required before running the optimisation
min_samples: 2000

# Maximum distance [m] in field space for a detection to be associated with a ground-truth landmark.
# Pairings beyond this distance (re-evaluated each ICP iteration) are rejected. Keep this comfortably below the
# spacing between same-type landmarks (e.g. the centre-circle X's are ~0.75 m apart) so ambiguous detections are
# dropped rather than mis-matched. 0.25 m is a good default; tighten to ~0.2 m if mis-association persists.
max_association_distance: 0.25

# Minimum head yaw/pitch change [rad] since the last captured frame before a new frame is gathered. The head
# sweeps automatically (the PlanLook provider steps through the grid in the role-specific PlanLook.yaml); this
# spreads samples across distinct viewpoints instead of over-sampling whichever pose the head is lingering in.
min_head_pose_change: 0.5 * pi / 180

# Maximum number of ICP iterations. Each iteration re-associates every collected detection at the current best
# offsets, then re-optimises with those associations held fixed. The loop stops early once the associations stop
# changing.
max_icp_iterations: 100

# Search bounds (half-width) on each offset delta [rad]: del_roll, del_pitch, del_yaw
offset_bounds: [10.0 * pi / 180, 10.0 * pi / 180, 10.0 * pi / 180]

# NLopt BOBYQA optimisation parameters
opt:
  xtol_rel: 1.0e-6
  ftol_rel: 1.0e-6
  maxeval: 1000
