# Controls the minimum log level that NUClear log will display
log_level: INFO

head_pose:
  - segment: _head_pose

# Deadband (metres for x/y, radians for theta) below which normalized odometry components are
# snapped to zero, avoiding tiny floating-point residuals (~1e-10) being treated as real motion
odometry_deadband: 1.0e-6

# Configurable transform from head frame to pitch frame
# translation: [x, y, z] in metres
# rotation_rpy: [roll, pitch, yaw] in radians
Hhp:
  translation: [0.0, 0.0, -0.08]
  rotation_rpy: [0.0, 0.0, 0.0]

# Transform from pitch frame to camera optical frame
# translation: [x, y, z] in metres
# rotation_rpy: [roll, pitch, yaw] in radians
Hpc:
  translation: [0.065, 0.035, 0.0915]
  rotation_rpy: [-0.0425, 0.0175, -0.09]
