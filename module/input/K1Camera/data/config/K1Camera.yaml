# Controls the minimum log level that NUClear log will display
log_level: INFO

# One entry per shared memory segment written by NUbridge.
# segment: POSIX shm name (ROS2 topic path with '/' replaced by '_')
# id:      integer camera ID emitted in message::input::Image
cameras:
  - segment: _boostercamera_head_raw_rgb
    name: Left Camera
    id: 0
  - segment: _boostercamera_head_raw_right_rgb
    name: Right Camera
    id: 1

urdf: models/robot.urdf
