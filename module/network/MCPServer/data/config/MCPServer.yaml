# Controls the minimum log level that NUClear log will display
log_level: DEBUG

# Address the MCP Streamable HTTP endpoint binds to
host: "0.0.0.0"

# Port the MCP endpoint listens on
port: 8080

# URL path of the MCP endpoint
path: "/mcp"

# Origin allowlist (DNS-rebinding protection). Empty list rejects every
# cross-origin request that sets an Origin header.
allowed_origins:
  - "https://claude.ai"

# Maximum number of messages held in the buffer before the oldest are dropped
max_buffered_messages: 100

# Message types buffered for the model to read via read_last_messages
messages:
  message.input.Sensors: true
