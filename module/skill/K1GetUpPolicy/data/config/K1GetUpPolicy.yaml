log_level: INFO

# mujoco_playground K1Getup fall-recovery policy (72-obs / 22-action ONNX). Actions are
# offsets on the CURRENT joint configuration (Go1Getup convention). All joint arrays are
# in the Booster SDK JointIndexK1 serial order.
model_path: "k1_getup.onnx"

# |roll| and |pitch| below this angle (rad) count as upright; sustained for
# upright_time seconds (with knees extended) the get-up reports Done.
upright_angle: 0.35
upright_time: 1.5
# Both knees must be flexed less than this (rad) to count as standing — the torso is
# already vertical mid-rise, so attitude alone hands off to the walk policy too early
# (standing knee ~0.4 rad, mid-rise > 1 rad).
knee_extended_angle: 0.9

# Global multiplier on action_scale_joint. MUST match the training config's
# action_scale (K1Getup trains with 3.0: get-up needs ~75% of the actuator torque
# limits, walking only 25%).
action_scale: 3.0

# Training-time actuation, identical to K1WalkPolicy (same playground model): kp = the
# XML position-actuator gains, kd = joint damping, action_scale_joint =
# 0.25 * effort_limit / kp.
kp: [3.948, 3.948,
     3.948, 3.948, 3.948, 3.948, 3.948, 3.948, 3.948, 3.948,
     30.201, 21.448, 17.846, 60.402, 35.692, 35.692,
     30.201, 21.448, 17.846, 60.402, 35.692, 35.692]
kd: [0.251, 0.251,
     0.251, 0.251, 0.251, 0.251, 0.251, 0.251, 0.251, 0.251,
     3.605, 2.56, 2.13, 4.807, 4.26, 4.26,
     3.605, 2.56, 2.13, 4.807, 4.26, 4.26]
action_scale_joint: [0.3799, 0.3799,
                     0.8865, 0.8865, 0.8865, 0.8865, 0.8865, 0.8865, 0.8865, 0.8865,
                     0.5629, 0.8859, 0.5365, 0.4636, 0.2683, 0.2683,
                     0.5629, 0.8859, 0.5365, 0.4636, 0.2683, 0.2683]
# Training keyframe ("home"), used only for the q - default_pose observation terms
default_pose: [0, 0,
               0, -1.3, 0, 0,
               0, 1.3, 0, 0,
               -0.2, 0, 0, 0.4, -0.2, 0,
               -0.2, 0, 0, 0.4, -0.2, 0]
