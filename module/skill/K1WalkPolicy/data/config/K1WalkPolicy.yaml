log_level: DEBUG

# mujoco_playground K1 joystick walk policy (82-obs / 22-action ONNX, contract pinned in
# NUSim docs/OBS_ACTION_CONTRACT.md). All joint arrays are in the Booster SDK
# JointIndexK1 serial order (head x2, L arm x4, R arm x4, L leg x6, R leg x6).
model_path: "k1_walk.onnx"

gait_frequency: 1.5 # Hz, phase advance rate (training randomizes U(1.25, 1.75))
stand_threshold: 0.01 # command norm below which the phase obs pins to [pi, pi] (standing)
action_scale: 1.0 # global multiplier on action_scale_joint (training config action_scale)
linvel_alpha: 0.3 # low-pass factor for the odometry-differentiated linear velocity estimate

# The policy does not own the head; its two targets are replaced with the latest
# BoosterHeadRot command and tracked with these gains (higher than the training head kp
# because there is no gravity feed-forward on this side of the wire).
head:
  kp: 10.0
  kd: 0.5

# In-walk kick emulation: forward velocity burst (same emulation as skill::K1Walk)
kick:
  velocity: [0.5, 0, 0]
  duration: 0.5

# Training-time actuation, mirrored from the playground k1_mjx_feetonly.xml: kp = its
# position-actuator gains; kd = its joint damping; action_scale_joint =
# 0.25 * effort_limit / kp (booster_train convention).
kp: [3.948, 3.948,
     3.948, 3.948, 3.948, 3.948, 3.948, 3.948, 3.948, 3.948,
     30.201, 21.448, 17.846, 60.402, 35.692, 35.692,
     30.201, 21.448, 17.846, 60.402, 35.692, 35.692]
kd: [0.251, 0.251,
     0.251, 0.251, 0.251, 0.251, 0.251, 0.251, 0.251, 0.251,
     3.605, 2.56, 2.13, 4.807, 4.26, 4.26,
     3.605, 2.56, 2.13, 4.807, 4.26, 4.26]
action_scale_joint: [0.3799, 0.3799,
                     0.8865, 0.8865, 0.8865, 0.8865, 0.8865, 0.8865, 0.8865, 0.8865,
                     0.5629, 0.8859, 0.5365, 0.4636, 0.2683, 0.2683,
                     0.5629, 0.8859, 0.5365, 0.4636, 0.2683, 0.2683]
# Training keyframe ("home"): arms tucked, legs crouched
default_pose: [0, 0,
               0, -1.3, 0, 0,
               0, 1.3, 0, 0,
               -0.2, 0, 0, 0.4, -0.2, 0,
               -0.2, 0, 0, 0.4, -0.2, 0]
