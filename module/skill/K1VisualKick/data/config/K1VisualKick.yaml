# Controls the minimum log level that NUClear log will display
log_level: INFO
# What version of Booster's visual kick to use (1 or 2)
version: 2
# How long, in seconds, to let the kick run before reporting the task as done. The SDK gives no
# completion feedback, so this should be tuned to roughly match how long the visual kick takes.
kick_duration: 3.0
