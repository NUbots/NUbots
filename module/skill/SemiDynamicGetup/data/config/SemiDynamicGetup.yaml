log_level: DEBUG

# Number of trailing frames from getup_back treated as the "rise phase" (balance-corrected).
# The remaining frames run unmodified as the "early phase".
rise_frame_count: 3

# Expected signed forward pitch of the torso (rad) at the start of the rise phase.
# atan2-based: 0 = fully upright, positive = leaning forward, negative = leaning backward
# (lying flat on the back = -π/2).
# The robot should be crouched leaning forward here, so ~40° (0.7 rad) is a reasonable default.
pitch_reference: 0.7

# Correction gain applied to both hip pitch joints in the rise frames.
# correction = clamp(Kp * (measured_pitch - pitch_reference), -max_correction, max_correction)
# Positive Kp: leaning further forward than expected extends the hips (raising the torso);
# leaning backward flexes them (pushing the CoM forward over the feet).
Kp: 0.3

# Maximum magnitude of the hip pitch correction (rad).
max_correction: 1.0

# ---------------------------------------------------------------------------
# Fall detection
#
# Settled-state check: at the end of RISE/STAND, if torso tilt still exceeds
# fall_recovery_tilt the getup is considered to have failed and is restarted.
#
# Dynamic check (mid-script RISE/STAND and during stabilisation): ported from
# FallingRelaxPlanner. Three signals — gyroscope magnitude, accelerometer
# magnitude and accelerometer angle from upright — are each exponentially
# smoothed and classified STABLE / UNSTABLE / FALLING against their thresholds.
# A fall is declared when any two of the three (or the accelerometer angle
# alone) read FALLING. The exponential filter replaces the old debounce: the
# `smoothing` factor is the weight kept on the previous value, so a higher
# value reacts more slowly and rejects transient spikes.
# These thresholds are copied from FallingRelaxPlanner.yaml (already tuned);
# re-tune here if the getup needs to be more or less twitchy than walking.
# ---------------------------------------------------------------------------

# Torso tilt threshold (rad) for the settled-state check: 0 = upright, π/2 = horizontal.
# ~57° (1.0 rad) means the robot has clearly re-fallen and is not recovering.
fall_recovery_tilt: 1.0

# Checks based on the sum of rotation rate for all the axes
gyroscope_magnitude:
  smoothing: 0.9 # weight on the previous (smoothed) value
  mean: 0.0 # value subtracted from the raw reading
  unstable: 2 # rad/s to consider the robot unstable
  falling: 2.0 # rad/s to consider the robot falling

# Checks based on the magnitude of the acceleration (drops toward free-fall)
accelerometer_magnitude:
  smoothing: 0.9
  mean: 9.8 # subtract gravity
  unstable: 7.0 # below this magnitude the robot is unstable
  falling: 5.0 # below this magnitude the robot is falling

# Checks based on the accelerometer angle from upright
accelerometer_angle:
  smoothing: 0.9
  mean: 0.0
  unstable: 35 * pi / 180.0 # rad from upright to consider the robot unstable
  falling: 45 * pi / 180.0 # rad from upright to consider the robot falling

# ---------------------------------------------------------------------------
# Foot polygon geometry
# These values should match KinematicsConfiguration.yaml.
# Origin is the ankle joint centre, with x-forward and y-left in the foot frame.
# ---------------------------------------------------------------------------
foot_toe_length: 0.130 # m — ankle to toe tip     (= KinematicsConfiguration leg.foot.toe_length)
foot_heel_length: 0.085 # m — ankle to heel         (= KinematicsConfiguration leg.heel_length)
foot_width: 0.130 # m — total lateral width   (= KinematicsConfiguration leg.foot.width)

# ---------------------------------------------------------------------------
# Capture-point stabilisation (STABILISE phase)
#
# After standing, the robot checks whether the Capture Point (Hof 2008)
#   CP = CoM_xy + CoM_vel_xy / ω,   ω = sqrt(g / h_com)
# lies inside the support polygon formed by both foot outlines.
# If not, it issues a corrective Walk command and re-checks every sensor cycle.
# ---------------------------------------------------------------------------

# Give up after this many seconds regardless of CP state.
max_stabilisation_time: 5.0

# CP must be at least this far (m) inside the support polygon to count as stable.
# Positive margin = conservative (requires CP to be well inside the polygon).
cp_margin: 0.02

# Walk speed per unit CP offset from the polygon centroid  (m/s per m).
# Larger values → faster corrective step; too large → overshoot.
cp_velocity_gain: 1.5

# Maximum speed of the corrective walk command in any direction (m/s).
max_step_velocity: 0.2

# Maximum rate (Hz) at which corrective Walk tasks are re-emitted.
# Between emissions the previous command stays active; the walk engine
# rate-limits itself internally, so commanding faster than ~10 Hz only adds
# Director churn.
walk_command_rate: 10.0

scripts:
  getup_back:
    - "StandUpBack.yaml"
  getup_stand:
    - "Stand.yaml"
