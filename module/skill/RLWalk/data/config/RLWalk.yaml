# Controls the minimum log level that NUClear log will display
log_level: DEBUG

model:
  path: /home/nubots/build/model.onnx
  device: CPU
  input_name: input
  output_name: output
  num_joints: 20
  obs_size: 72

default_pose: # Same as in Mujoco.yaml
  - 1.71400e+00 # Right shoulder pitch
  - 1.71600e+00 # Left shoulder pitch
  - -1.98000e-01 # Right shoulder roll
  - 1.98000e-01 # Left shoulder roll
  - -7.20000e-01 # Right elbow pitch
  - -7.15000e-01 # Left elbow pitch
  - -3.30000e-02 # Right hip yaw
  - 3.40000e-02 # Left hip yaw
  - -1.62000e-01 # Right hip roll
  - 1.63000e-01 # Left hip roll
  - -9.05000e-01 # Right hip pitch
  - -9.05000e-01 # Left hip pitch
  - 1.20600e+00 # Right knee pitch
  - 1.20600e+00 # Left knee pitch
  - -5.10000e-01 # Right ankle pitch
  - -5.12000e-01 # Left ankle pitch
  - 1.68000e-01 # Right ankle roll
  - -1.67000e-01 # Left ankle roll
  - 0.00000e+00 # Neck yaw
  - 0.00000e+00 # Head pitch
