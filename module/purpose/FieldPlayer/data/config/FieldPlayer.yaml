# Controls the minimum log level that NUClear log will display
log_level: INFO

ball_threshold: 0.5
equidistant_threshold: 0.4
ball_off_center_threshold: 0.75
center_circle_offset: 0.5

max_localisation_cost: 3.0
search_when_lost: false

# Maximum time in seconds to stand still and look around waiting to localise before playing anyway
localise_timeout: 8
